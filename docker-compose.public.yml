services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: radio_store
    # Postgres is NOT published on the host by default (avoids port 5432 conflicts).
    # For external DB clients, add -f docker-compose.db-tunnel.yml (see README).
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "80:3000"
    env_file:
      - .env.public
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/radio_store?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Hytera Radios}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/products/uploads:/app/public/products/uploads
      - ./public/hero/uploads:/app/public/hero/uploads
      - ./public/featured/uploads:/app/public/featured/uploads
      - ./public/site/uploads:/app/public/site/uploads
      - ./uploads:/app/uploads

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
